<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <defs>
    <!-- Background Amber Glow Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Gold/Amber Border Gradient -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    
    <!-- Text Amber-to-Yellow Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="30%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    
    <!-- Subtle drop shadow on the letters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing background underlay -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#09090b" stroke="url(#goldBorder)" stroke-width="2"/>
  <rect x="2" y="2" width="44" height="44" rx="10" fill="url(#bgGlow)"/>

  <!-- Centered glowing brand initials "SM" -->
  <g filter="url(#glow)">
    <text x="50%" y="60%" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-weight="900" 
          font-size="20" 
          fill="url(#textGrad)" 
          text-anchor="middle" 
          letter-spacing="0.5" 
          dominant-baseline="middle">SM</text>
  </g>
</svg>